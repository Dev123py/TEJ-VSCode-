<!DOCTYPE html>
<html>
<head>
    <title>X-Website Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form action="/send-text" method="POST">
            <input type="text" name="first_name" placeholder="Username" maxlength="16">
            
            <input type="text" name="last_name" placeholder="Password" maxlength="16">
            <br><br>
            <input type="submit" value="Login">
        </form>
    </div>
</body>
</html>
